name: 🏦 Veridian Bank — Schema Sync

on:
  push:
    branches: [main]
    paths:
      - 'entities/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate-schemas:
    name: Validate Entity Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON Schemas
        run: |
          echo "🔍 Validating entity schemas..."
          for file in entities/*.json; do
            echo "  Checking $file..."
            python3 -c "import json; json.load(open('$file')); print('  ✅ $file is valid JSON')"
          done

      - name: Check SQL Migration
        run: |
          echo "🔍 Checking SQL migration file..."
          if [ -f "scripts/supabase_migration.sql" ]; then
            echo "  ✅ Migration script exists"
            wc -l scripts/supabase_migration.sql
          else
            echo "  ❌ Migration script missing!"
            exit 1
          fi

      - name: Summary
        run: |
          echo "✅ All Veridian Bank schemas are valid!"
          echo "📋 Entities: $(ls entities/*.json | wc -l)"
          echo "📄 Scripts: $(ls scripts/*.sql | wc -l)"
